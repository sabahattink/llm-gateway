name: Feature request
description: Propose a focused improvement to LLM Gateway.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operational problem should this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful solution and expected behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: scope
    attributes:
      label: Primary area
      options:
        - Provider adapter
        - OpenAI compatibility
        - Streaming
        - Security
        - Observability
        - Admin UI
        - Deployment
        - Documentation
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for a similar request.
          required: true
        - label: This request does not contain credentials or private data.
          required: true
