name: Bug report
description: Report a reproducible problem in LLM Gateway.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include provider API keys, gateway tokens, passwords, or private prompts.

  - type: input
    id: version
    attributes:
      label: Version
      description: Output from `llm-gateway --version` or the container tag.
      placeholder: v1.1.0
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker / Docker Compose
        - Release binary
        - Source build
    validations:
      required: true

  - type: input
    id: provider
    attributes:
      label: Provider and model
      placeholder: anthropic / claude-sonnet-4-6

  - type: textarea
    id: description
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe sequence that reproduces the problem.
      placeholder: |
        1. Start the gateway with ...
        2. Send ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove all credentials and sensitive prompt content.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed credentials and sensitive data from this report.
          required: true
