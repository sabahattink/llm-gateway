name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: 1.26.5
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Build
        run: go build ./cmd/gateway

  docker:
    runs-on: ubuntu-latest
    env:
      LLM_GATEWAY_API_KEY: 0123456789abcdef0123456789abcdef
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build container image
        run: docker build --tag llm-gateway:ci .

      - name: Start hardened container
        run: docker compose up --detach --build

      - name: Verify container runtime
        run: |
          container_id="$(docker compose ps --quiet gateway)"
          test -n "$container_id"
          test "$(docker inspect --format '{{.Config.User}}' "$container_id")" = "gateway:gateway"
          test "$(docker inspect --format '{{.HostConfig.ReadonlyRootfs}}' "$container_id")" = "true"
          docker inspect --format '{{json .HostConfig.SecurityOpt}}' "$container_id" \
            | grep -F 'no-new-privileges:true'

          for attempt in $(seq 1 30); do
            health="$(docker inspect --format '{{.State.Health.Status}}' "$container_id")"
            if [ "$health" = "healthy" ]; then
              break
            fi
            if [ "$health" = "unhealthy" ]; then
              docker logs "$container_id"
              exit 1
            fi
            sleep 1
          done

          test "$(docker inspect --format '{{.State.Health.Status}}' "$container_id")" = "healthy"
          curl --fail --silent --show-error http://127.0.0.1:8080/health >/dev/null
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --request POST http://127.0.0.1:8080/v1/chat/completions)" = "401"
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer $LLM_GATEWAY_API_KEY" \
            http://127.0.0.1:8080/v1/chat/completions)" = "400"

      - name: Show container logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop container
        if: always()
        run: docker compose down --volumes
